# Auto-deploy: every push to main rebuilds the CRM on the Hostinger VPS.
# Needs two repo secrets (GitHub → repo → Settings → Secrets and variables → Actions):
#   VPS_HOST     — the VPS IP address
#   VPS_SSH_KEY  — a private SSH key whose public half is in /root/.ssh/authorized_keys on the VPS
name: Deploy to Hostinger VPS
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # manual "Run workflow" button too

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Pull, build & restart on the VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            cd /var/www/serpsquad
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run build
            pm2 restart serpsquad-api --update-env
            echo "deployed $(git rev-parse --short HEAD)"
