# SERP Squad CRM — app.serpsquad.com (pair with certbot for TLS)
server {
    listen 80;
    server_name app.serpsquad.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name app.serpsquad.com;

    ssl_certificate     /etc/letsencrypt/live/app.serpsquad.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.serpsquad.com/privkey.pem;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # API + pixel → the Node server on localhost
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location = /px.js {
        proxy_pass http://127.0.0.1:8787;
    }

    # built SPA
    root /var/www/serpsquad/dist;
    index index.html;
    location / {
        try_files $uri /index.html;
    }
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
